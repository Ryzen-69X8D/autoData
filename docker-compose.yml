version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Shared environment for all Airflow services
# ─────────────────────────────────────────────────────────────────────────────
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # Allow tasks to import from /opt/airflow/src
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./models:/opt/airflow/models
    - ./logs:/opt/airflow/logs
    - ./scripts:/opt/airflow/scripts  
  dns:
    - 8.8.8.8
    - 8.8.4.4
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL (Airflow metadata DB) ───────────────────────────────────────
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Airflow DB init + admin user creation ──────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
          airflow db migrate && \
          airflow users create \
            --username admin \
            --password admin \
            --firstname Akash \
            --lastname Kundu \
            --role Admin \
            --email akashkundu1152@gmail.com
            
    restart: on-failure

  # ── Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout:  10s
      retries:  5

  # ── Airflow Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-webserver:
        condition: service_started

  # ── FastAPI Prediction Service ─────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      DATABASE_URL: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      JWT_SECRET: local-docker-secret-change-me
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000
      MODEL_DIR: /app/models/prod
      RAW_DATA_PATH: /app/data/raw/stock_data.csv
      PROCESSED_DATA_PATH: /app/data/processed/processed_data.csv
      AUTO_CREATE_TABLES: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout:  10s
      retries:  3
    depends_on:
      - airflow-scheduler

volumes:
  postgres_data:
