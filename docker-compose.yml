version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Shared environment for all Airflow services
# ─────────────────────────────────────────────────────────────────────────────
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # Allow tasks to import from /opt/airflow/src
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./models:/opt/airflow/models
    - ./logs:/opt/airflow/logs
  dns:
    - 8.8.8.8
    - 8.8.4.4
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL (Airflow metadata DB) ───────────────────────────────────────
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Airflow DB init + admin user creation ──────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
          airflow db migrate && \
          airflow users create \
            --username admin \
            --password admin \
            --firstname Akash \
            --lastname Kundu \
            --role Admin \
            --email akashkundu1152@gmail.com
            
    restart: on-failure

  # ── Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout:  10s
      retries:  5

  # ── Airflow Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-webserver:
        condition: service_started

  # ── FastAPI Prediction Service ─────────────────────────────────────────────
  # FIX: This service was completely missing from the original docker-compose.
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Share the models directory so FastAPI sees newly deployed models
      - ./models:/opt/airflow/models
    environment:
      MODEL_PATH:  /opt/airflow/models/random_forest.pkl
      SCALER_PATH: /opt/airflow/models/scaler.pkl
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
    # Start after Airflow so a model has a chance to exist
    depends_on:
      - airflow-scheduler

volumes:
  postgres_data:
